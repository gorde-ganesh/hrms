name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-typecheck:
    name: Backend — TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hrms-backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run backend tests
        run: bun run test
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

  frontend-build:
    name: Frontend — Production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hrms-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hrms-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build -- --configuration production

  frontend-test:
    name: Frontend — Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hrms-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hrms-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Check coverage thresholds
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            const threshold = 60;
            const fields = ['lines', 'statements', 'functions', 'branches'];
            let failed = false;
            for (const f of fields) {
              const pct = total[f].pct;
              if (pct < threshold) {
                console.error('Coverage ' + f + ' ' + pct + '% is below threshold ' + threshold + '%');
                failed = true;
              }
            }
            if (failed) process.exit(1);
            console.log('All coverage thresholds passed.');
          "

