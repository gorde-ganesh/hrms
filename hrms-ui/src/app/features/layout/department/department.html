<div class="space-y-6">
  <!-- ── Page header ── -->
  <div class="flex items-start justify-between">
    <div>
      <h1 class="text-2xl font-bold text-color leading-tight mb-1">
        Departments
      </h1>
      <p class="text-sm text-muted-color flex items-center gap-2">
        <i class="pi pi-users text-xs"></i>
        Maintain your org structure and business units.
      </p>
    </div>
    <p-button
      label="Add Department"
      icon="pi pi-user-plus"
      (onClick)="openCreateDialog()"
    />
  </div>

  <div
    class="bg-card text-card-foreground rounded-xl border border-surface p-6 shadow-sm"
  >
    <div class="flex flex-wrap gap-4 justify-between mb-4">
      <div class="text-sm text-muted-color self-center">
        {{ totalRecords }} records
      </div>

      <p-iconfield iconPosition="left">
        <p-inputicon>
          <i class="pi pi-search"></i>
        </p-inputicon>
        <input
          pInputText
          type="text"
          placeholder="Search"
          (input)="applyGlobalFilter($event)"
        />
      </p-iconfield>
    </div>

    <p-table
      #dt
      [value]="departments"
      [tableStyle]="{ 'min-width': '50rem' }"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [lazy]="true"
      (onLazyLoad)="loadDepartments($event)"
      [totalRecords]="totalRecords"
      emptyMessage="No departments found"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th class="w-32 text-right">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="font-medium">{{ row.name }}</td>
          <td class="max-w-xl whitespace-pre-line">
            {{ row.description || '-' }}
          </td>
          <td class="text-right space-x-2">
            <p-button
              icon="pi pi-pencil"
              rounded="true"
              severity="secondary"
              [text]="true"
              (onClick)="editDepartment(row)"
            ></p-button>
            <p-button
              icon="pi pi-trash"
              rounded="true"
              severity="danger"
              [text]="true"
              (onClick)="confirmDelete($event, row)"
            ></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmpopup></p-confirmpopup>

<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '32rem' }"
  [draggable]="false"
  (onHide)="departmentForm.reset()"
>
  <ng-template pTemplate="header">
    {{ isEditMode ? 'Update Department' : 'Add Department' }}
  </ng-template>

  <form
    [formGroup]="departmentForm"
    class="flex flex-col gap-4"
    (ngSubmit)="saveDepartment()"
  >
    <p-floatlabel class="w-full" variant="on">
      <input
        pInputText
        formControlName="name"
        id="department-name"
        class="w-full"
        autocomplete="off"
      />
      <label for="department-name">Name</label>
      <ng-template [formError]="'name'"></ng-template>
    </p-floatlabel>

    <p-floatlabel class="w-full" variant="on">
      <textarea
        pTextarea
        rows="3"
        class="w-full"
        formControlName="description"
        id="department-description"
      ></textarea>
      <label for="department-description">Description</label>
      <ng-template [formError]="'description'"></ng-template>
    </p-floatlabel>

    <div class="flex justify-end gap-3 mt-2">
      <p-button
        type="button"
        label="Cancel"
        severity="secondary"
        (onClick)="dialogVisible = false"
      ></p-button>
      <p-button
        type="submit"
        [label]="isEditMode ? 'Update' : 'Create'"
        [disabled]="departmentForm.invalid"
      ></p-button>
    </div>
  </form>
</p-dialog>
